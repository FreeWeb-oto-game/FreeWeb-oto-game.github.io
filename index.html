<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#101427" />
    <meta
      name="description"
      content="タッチで遊べるGitHub Pages向けWeb音ゲー。"
    />
    <title>Starlight Beats</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-stage" aria-label="Starlight Beats">
        <div class="stage-backdrop" aria-hidden="true">
          <div class="spotlight spotlight-a"></div>
          <div class="spotlight spotlight-b"></div>
          <div class="spotlight spotlight-c"></div>
          <div class="crowd-lights"></div>
        </div>

        <header class="hud hud-top">
          <div class="brand-lockup" aria-label="ゲームタイトル">
            <span class="brand-mark">SB</span>
            <div>
              <p class="kicker">Touch Rhythm</p>
              <h1>Starlight Beats</h1>
            </div>
          </div>

          <div class="hud-stats" aria-live="polite">
            <div class="stat">
              <span>Score</span>
              <strong id="score">0000000</strong>
            </div>
            <div class="stat">
              <span>Combo</span>
              <strong id="combo">0</strong>
            </div>
            <div class="stat stat-rank">
              <span>Rank</span>
              <strong id="rank">C</strong>
            </div>
          </div>
        </header>

        <div class="playfield-wrap">
          <canvas
            id="gameCanvas"
            width="900"
            height="1400"
            aria-label="ノーツが奥から手前へ流れるリズムゲーム画面"
          ></canvas>

          <div class="judgement" id="judgement" aria-live="polite">READY</div>
          <div class="lane-labels" aria-hidden="true">
            <span>1</span>
            <span>2</span>
            <span>3</span>
            <span>4</span>
            <span>5</span>
          </div>
        </div>

        <footer class="hud hud-bottom">
          <div class="track-info">
            <span class="cover-art" aria-hidden="true"></span>
            <div>
              <p id="songTitle">Neon Bloom</p>
              <span id="songMeta">BPM 128 / Normal</span>
            </div>
          </div>

          <div class="controls">
            <button class="icon-button" id="pauseButton" type="button" aria-label="一時停止">
              <span aria-hidden="true">Ⅱ</span>
            </button>
            <button class="primary-button" id="startButton" type="button">
              Start
            </button>
            <button class="icon-button" id="muteButton" type="button" aria-label="ミュート切り替え">
              <span aria-hidden="true">♪</span>
            </button>
          </div>
        </footer>

        <div class="touch-bars" id="touchBars" aria-label="タッチレーン">
          <button type="button" data-lane="0" aria-label="レーン1"></button>
          <button type="button" data-lane="1" aria-label="レーン2"></button>
          <button type="button" data-lane="2" aria-label="レーン3"></button>
          <button type="button" data-lane="3" aria-label="レーン4"></button>
          <button type="button" data-lane="4" aria-label="レーン5"></button>
        </div>

        <dialog class="result-modal" id="resultModal">
          <form method="dialog">
            <p class="kicker">Result</p>
            <h2 id="resultTitle">Live Clear</h2>
